server:
  port: 8085

spring:
  application:
    name: ms-sucursales
  datasource:
    url: jdbc:mysql://localhost:3306/rentacar_sucursales?createDatabaseIfNotExist=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
